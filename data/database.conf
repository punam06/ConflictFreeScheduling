# Database Configuration for Conflict-Free Scheduling System

# SQLite Configuration (Default - lightweight, no server required)
[sqlite]
database_file = "data/scheduling.db"
enable_foreign_keys = true
journal_mode = "WAL"
synchronous = "NORMAL"
cache_size = 10000

# PostgreSQL Configuration (Production - requires server setup)
[postgresql]
host = "localhost"
port = 5432
database = "conflict_free_scheduling"
username = "scheduler_user"
password = "your_secure_password"
ssl_mode = "prefer"
connection_pool_size = 10
connection_timeout = 30

# MySQL Configuration (Alternative production option)
[mysql]
host = "localhost"
port = 3306
database = "conflict_free_scheduling"
username = "scheduler_user"
password = "your_secure_password"
charset = "utf8mb4"
connection_pool_size = 10
connection_timeout = 30

# Database Migration Settings
[migration]
auto_migrate = true
backup_before_migration = true
migration_timeout = 300

# Performance Settings
[performance]
query_timeout = 30
batch_size = 1000
enable_query_logging = false
log_slow_queries = true
slow_query_threshold = 1000  # milliseconds

# Security Settings
[security]
enable_prepared_statements = true
max_connections = 100
idle_timeout = 3600  # seconds
enable_ssl = true
